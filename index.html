<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MystyEngine Studio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>MystyEngine Studio</h1>
      <p>Editor + runtime para aventuras point-and-click tipo Myst-like.</p>
    </header>

    <main class="layout">
      <aside class="panel controls">
        <section>
          <h2>Proyecto</h2>
          <div class="actions">
            <button id="newProjectBtn">Nuevo proyecto</button>
            <button id="openFolderBtn">Abrir carpeta de trabajo</button>
            <button id="saveProjectBtn" class="primary">Guardar proyecto</button>
            <button id="loadProjectBtn">Cargar proyecto</button>
          </div>
          <small id="folderStatus">Sin carpeta conectada.</small>
        </section>

        <section>
          <h2>Escenas</h2>
          <div class="actions row">
            <input id="sceneNameInput" placeholder="Nombre escena" />
            <button id="addSceneBtn">+ Añadir</button>
          </div>
          <ul id="sceneList" class="list"></ul>
        </section>

        <section>
          <h2>Herramientas</h2>
          <div class="actions">
            <button id="addHotspotBtn">Añadir hotspot</button>
            <button id="addDialogueBtn">Añadir diálogo</button>
            <button id="addAmbientTrackBtn">Añadir música ambiental</button>
            <button id="previewBtn" class="primary">Probar aventura</button>
          </div>
        </section>
      </aside>

      <section class="panel editor" id="editorPanel">
        <h2>Editor</h2>
        <p>Selecciona o crea una escena para empezar.</p>
      </section>

      <section class="panel runtime" id="runtimePanel">
        <h2>Runtime</h2>
        <div id="runtimeRoot" class="runtime-root"></div>
      </section>
    </main>

    <template id="sceneEditorTemplate">
      <div class="scene-editor">
        <div class="field-group">
          <label>Nombre de escena</label>
          <input data-field="name" />
        </div>

        <div class="field-group">
          <label>Descripción</label>
          <textarea data-field="description" rows="3"></textarea>
        </div>

        <div class="field-group">
          <label>Imagen de fondo (URL o ruta relativa)</label>
          <input data-field="background" placeholder="assets/scene-01.jpg" />
        </div>

        <div class="split">
          <div>
            <h3>Hotspots / Objetos interactivos</h3>
            <div data-hotspots></div>
          </div>
          <div>
            <h3>Diálogos</h3>
            <div data-dialogues></div>
          </div>
        </div>

        <div>
          <h3>Música ambiental por escena</h3>
          <div data-ambient></div>
        </div>
      </div>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>
